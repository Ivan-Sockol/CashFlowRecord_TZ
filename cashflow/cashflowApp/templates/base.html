<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Управление ДДС</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .navbar-brand { font-weight: bold; }
        .filter-section {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .action-buttons .btn { margin-right: 5px; }
        .table-responsive { margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'cashflowApp:index' %}">
                <i class="bi bi-wallet2"></i> ДДС Управление
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'cashflowApp:index' %}">
                    <i class="bi bi-list-ul"></i> Записи
                </a>
                <a class="nav-link" href="{% url 'cashflowApp:reference_list' %}">
                    <i class="bi bi-gear"></i> Справочники
                </a>
                <a class="nav-link" href="{% url 'cashflowApp:record_create' %}">
                    <i class="bi bi-plus-circle"></i> Создать
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
